# Blueprint de Render — https://render.com/docs/blueprint-spec
# Ajustá los nombres y conectá el repo desde el dashboard de Render.

services:
  # ─── API (Node.js + SQLite en disco persistente) ─────────────
  - type: web
    name: tuagendaya-api
    runtime: node
    rootDir: backend
    # Disco persistente requiere plan Starter+ (no Free)
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /var/data/tuagendaya.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
    disk:
      name: tuagendaya-data
      mountPath: /var/data
      sizeGB: 1

  # ─── Frontend (sitio estático Vite) ──────────────────────────
  - type: web
    name: tuagendaya-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
