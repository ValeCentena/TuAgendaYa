<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <link id="app-manifest" rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />

    <meta name="theme-color" content="#0071e3" />
    <meta name="color-scheme" content="light" />

    <meta name="application-name" content="TuAgendaYa" />
    <meta name="description" content="Agenda online para negocios y profesionales." />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TuAgendaYa" />

    <meta property="og:title" content="TuAgendaYa" />
    <meta property="og:description" content="Agenda online para negocios y profesionales." />
    <meta property="og:image" content="https://tuagendaya.com/og-image.png?v=1" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tuagendaya.com" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TuAgendaYa" />
    <meta name="twitter:description" content="Agenda online para negocios y profesionales." />
    <meta name="twitter:image" content="https://tuagendaya.com/og-image.png?v=1" />

    <title>TuAgendaYa</title>

    <style>
      html {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        touch-action: manipulation;
      }

      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background: #f5f5f7;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-x: none;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }

      input,
      textarea,
      select,
      button {
        font-size: 16px !important;
      }

      input,
      textarea,
      select {
        -webkit-user-select: text;
        user-select: text;
      }

      button,
      a {
        touch-action: manipulation;
      }

      * {
        box-sizing: border-box;
      }
    </style>

    <script>
      (function () {
        var isAdmin = window.location.pathname.startsWith("/admin");
        var manifest = document.getElementById("app-manifest");

        if (manifest) {
          manifest.setAttribute(
            "href",
            isAdmin ? "/admin-manifest.webmanifest" : "/manifest.webmanifest"
          );
        }

        if (isAdmin) {
          document.title = "TuAgendaYa Admin";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
